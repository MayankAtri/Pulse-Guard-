name: E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  smoke:
    name: End-to-End Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke suite
        run: BOOT_STACK=1 KEEP_STACK=0 npm run test:e2e:smoke
